version: '3.8'

services:
  db:
    image: postgres:15
    container_name: mediscanai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mediscanai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mediscanai_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/mediscanai
      SECRET_KEY: mediscanai_super_secret_key_2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models

  frontend:
    build: ./frontend
    container_name: mediscanai_frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  postgres_data: